<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Saving Parking Spot</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    :root {
      --bg: #171717;
      --panel: #232323;
      --panel-soft: #2e2e2e;
      --text: #ffffff;
      --muted: #b8b8b8;
      --accent: #ffd400;
      --success: #35c46a;
      --info: #4d90fe;
      --danger: #d85d5d;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 14px 34px rgba(0,0,0,0.28);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,212,0,0.10), transparent 22%),
        linear-gradient(180deg, #1a1a1a 0%, #171717 100%);
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 460px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.025));
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .top {
      padding: 26px 20px 18px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border-bottom: 1px solid var(--border);
    }

    .title {
      margin: 0;
      font-size: 1.8rem;
      color: var(--accent);
      letter-spacing: 0.3px;
      font-weight: 800;
    }

    .content {
      padding: 18px;
    }

    .hero {
      background: linear-gradient(180deg, #2a2a2a, #232323);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 16px;
      text-align: center;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .hero-icon {
      width: 84px;
      height: 84px;
      margin: 0 auto 12px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.25s ease;
    }

    .hero.saved .hero-icon {
      background: rgba(53,196,106,0.16);
      border-color: rgba(53,196,106,0.35);
      transform: scale(1.03);
    }

    .hero.waiting .hero-icon {
      background: rgba(255,212,0,0.12);
      border-color: rgba(255,212,0,0.28);
    }

    .hero.error .hero-icon {
      background: rgba(216,93,93,0.14);
      border-color: rgba(216,93,93,0.3);
    }

    .hero-title {
      font-size: 1.18rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .hero-text {
      color: #e8e8e8;
      line-height: 1.45;
      min-height: 46px;
    }

    .hero-meta {
      margin-top: 10px;
      color: #cfcfcf;
      font-size: 0.86rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0 16px;
    }

    .pill {
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 0.8rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      color: #ececec;
    }

    .pill.ok { color: #cbffd9; }
    .pill.warn { color: #ffe8a8; }

    .buttons {
      display: grid;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 16px;
      min-height: 58px;
      width: 100%;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      padding: 14px 16px;
      transition: transform 0.12s ease, opacity 0.18s ease, filter 0.18s ease;
      box-shadow: var(--shadow);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.62;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .show-btn {
      background: linear-gradient(180deg, #629dff, #447fea);
    }

    .nav-btn {
      background: linear-gradient(180deg, #5c92ff, #3f76e8);
    }

    .clear-btn {
      background: linear-gradient(180deg, #dd6b6b, #c14f4f);
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.83rem;
      text-align: center;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1 class="title">Quick Saving Parking Spot</h1>
    </div>

    <div class="content">
      <div id="hero" class="hero waiting">
        <div id="heroIcon" class="hero-icon">📍</div>
        <div id="heroTitle" class="hero-title">Starting...</div>
        <div id="heroText" class="hero-text">Preparing location access and secure storage.</div>
        <div id="heroMeta" class="hero-meta"></div>
      </div>

      <div class="pill-row">
        <div id="cloudPill" class="pill">Cloud: checking...</div>
        <div id="localPill" class="pill">Local backup: checking...</div>
        <div id="modePill" class="pill">Mode: checking...</div>
      </div>

      <div class="buttons">
        <button class="show-btn" id="showBtn" onclick="showSavedLocation()">
          🗺️ Show on Maps
        </button>

        <button class="nav-btn" id="navigateBtn" onclick="navigateToSavedLocation()">
          🧭 Navigate There
        </button>

        <button class="clear-btn" id="clearBtn" onclick="clearSavedLocation()">
          🗑️ Clear Saved Data
        </button>
      </div>

      <div class="footer-note">
        Use NFC with <strong>?mode=save</strong> to save automatically without overwriting the spot during normal viewing.
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
    import {
      initializeFirestore,
      persistentLocalCache,
      persistentSingleTabManager,
      doc,
      setDoc,
      getDoc,
      deleteDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const firebaseConfig = {
    apiKey: "AIzaSyBJOuWflHjO3_b-VTerQrhrleIVBz50GGg",
    authDomain: "mini-cooper-routine.firebaseapp.com",
    projectId: "mini-cooper-routine",
    storageBucket: "mini-cooper-routine.firebasestorage.app",
    messagingSenderId: "734879685589",
    appId: "1:734879685589:web:a9a7f1b776efce00e43b5c",
    measurementId: "G-1LETT1WZQ6"
  };

    const LOCAL_KEY = "quickParkingSaveLocalBackupV2";

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, {
      localCache: persistentLocalCache({
        tabManager: persistentSingleTabManager()
      })
    });
    const auth = getAuth(app);

    const heroEl = document.getElementById("hero");
    const heroIconEl = document.getElementById("heroIcon");
    const heroTitleEl = document.getElementById("heroTitle");
    const heroTextEl = document.getElementById("heroText");
    const heroMetaEl = document.getElementById("heroMeta");

    const cloudPillEl = document.getElementById("cloudPill");
    const localPillEl = document.getElementById("localPill");
    const modePillEl = document.getElementById("modePill");

    const showBtn = document.getElementById("showBtn");
    const navigateBtn = document.getElementById("navigateBtn");
    const clearBtn = document.getElementById("clearBtn");

    let currentUser = null;
    let lastKnownSpot = null;

    const params = new URLSearchParams(window.location.search);
    const currentMode = params.get("mode") === "save" ? "save" : "view";

    function setBusy(isBusy) {
      showBtn.disabled = isBusy;
      navigateBtn.disabled = isBusy;
      clearBtn.disabled = isBusy;
    }

    function setPill(el, text, type = "") {
      el.textContent = text;
      el.className = `pill ${type}`.trim();
    }

    function formatDate(ms) {
      if (!ms) return "unknown time";
      return new Date(ms).toLocaleString("en-GB");
    }

    function getParkingDocRef(uid) {
      return doc(db, "users", uid, "parking", "current");
    }

    function setHeroState(type, title, text, meta = "") {
      heroEl.className = `hero ${type}`;
      heroTitleEl.textContent = title;
      heroTextEl.textContent = text;
      heroMetaEl.textContent = meta;

      if (type === "saved") heroIconEl.textContent = "✅";
      else if (type === "error") heroIconEl.textContent = "⚠️";
      else heroIconEl.textContent = "📍";
    }

    function saveLocalBackup(data) {
      localStorage.setItem(LOCAL_KEY, JSON.stringify(data));
      setPill(localPillEl, "Local backup: ready", "ok");
    }

    function readLocalBackup() {
      try {
        const raw = localStorage.getItem(LOCAL_KEY);
        if (!raw) {
          setPill(localPillEl, "Local backup: empty");
          return null;
        }
        const parsed = JSON.parse(raw);
        setPill(localPillEl, "Local backup: ready", "ok");
        return parsed;
      } catch (error) {
        console.error(error);
        setPill(localPillEl, "Local backup: error", "warn");
        return null;
      }
    }

    function clearLocalBackup() {
      localStorage.removeItem(LOCAL_KEY);
      setPill(localPillEl, "Local backup: empty");
    }

    function updateHeroFromSpot(spot, source = "cloud") {
      if (!spot) {
        setHeroState(
          "waiting",
          "No saved location",
          "No parking spot is currently stored."
        );
        return;
      }

      const meta = [
        `Saved: ${formatDate(spot.savedAtMillis)}`,
        `Accuracy: ${spot.accuracy ? Math.round(spot.accuracy) + "m" : "unknown"}`,
        `Source: ${source}`
      ].join(" • ");

      setHeroState(
        "saved",
        "Parking spot saved successfully",
        "Your saved spot is ready to open in Google Maps.",
        meta
      );
    }

    async function ensureAnonymousLogin() {
      return new Promise((resolve, reject) => {
        const unsubscribe = onAuthStateChanged(auth, async (user) => {
          if (user) {
            currentUser = user;
            unsubscribe();
            resolve(user);
            return;
          }

          try {
            const result = await signInAnonymously(auth);
            currentUser = result.user;
            unsubscribe();
            resolve(result.user);
          } catch (error) {
            unsubscribe();
            reject(error);
          }
        });
      });
    }

    async function loadCloudSpot() {
      if (!currentUser) return null;

      try {
        const snap = await getDoc(getParkingDocRef(currentUser.uid));

        if (!snap.exists()) {
          setPill(cloudPillEl, "Cloud: empty");
          return null;
        }

        const data = snap.data();
        const spot = {
          lat: data.lat,
          lng: data.lng,
          accuracy: data.accuracy || null,
          savedAtMillis: data.savedAtMillis || null
        };

        setPill(cloudPillEl, "Cloud: ready", "ok");
        return spot;
      } catch (error) {
        console.error(error);
        setPill(cloudPillEl, "Cloud: unavailable", "warn");
        return null;
      }
    }

    function getCurrentLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("Geolocation is not supported on this device/browser."));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => resolve(position),
          (error) => reject(error),
          {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
          }
        );
      });
    }

    async function saveParkingLocation() {
      if (!currentUser) {
        setHeroState("error", "Cloud not ready", "Please refresh and try again.");
        return;
      }

      setHeroState(
        "waiting",
        "Saving parking spot",
        "Please allow location access if your browser asks for permission."
      );

      setBusy(true);

      try {
        const position = await getCurrentLocation();

        const spot = {
          lat: position.coords.latitude,
          lng: position.coords.longitude,
          accuracy: position.coords.accuracy,
          savedAtMillis: Date.now()
        };

        saveLocalBackup(spot);
        lastKnownSpot = spot;
        updateHeroFromSpot(spot, "local backup");

        try {
          await setDoc(getParkingDocRef(currentUser.uid), {
            ...spot,
            savedAt: serverTimestamp()
          });

          setPill(cloudPillEl, "Cloud: synced", "ok");
          updateHeroFromSpot(spot, "cloud + local backup");

          if (navigator.vibrate) {
            navigator.vibrate(80);
          }
        } catch (cloudError) {
          console.error(cloudError);
          setPill(cloudPillEl, "Cloud: pending/failed", "warn");

          setHeroState(
            "saved",
            "Saved locally",
            "The spot was stored on this device, but cloud sync failed.",
            `Saved: ${formatDate(spot.savedAtMillis)} • Accuracy: ${Math.round(spot.accuracy)}m`
          );
        }
      } catch (error) {
        console.error(error);

        if (error.code === 1) {
          setHeroState(
            "error",
            "Location permission denied",
            "The browser did not get permission, so nothing was saved."
          );
        } else if (error.code === 2) {
          setHeroState(
            "error",
            "Location unavailable",
            "Try again in a place with better GPS signal."
          );
        } else if (error.code === 3) {
          setHeroState(
            "error",
            "Location request timed out",
            "Please try again."
          );
        } else {
          setHeroState(
            "error",
            "Could not get location",
            error.message || "Unknown error."
          );
        }
      } finally {
        setBusy(false);
      }
    }

    function getBestAvailableSpot() {
      if (lastKnownSpot) return { spot: lastKnownSpot, source: "memory" };

      const localSpot = readLocalBackup();
      if (localSpot) return { spot: localSpot, source: "local backup" };

      return { spot: null, source: null };
    }

    async function showSavedLocation() {
      setBusy(true);
      setHeroState("waiting", "Checking saved location", "Opening your saved point in Google Maps...");

      try {
        let cloudSpot = null;

        if (currentUser) {
          cloudSpot = await loadCloudSpot();
        }

        const chosen = cloudSpot ? { spot: cloudSpot, source: "cloud" } : getBestAvailableSpot();

        if (!chosen.spot) {
          setHeroState(
            "error",
            "No saved location found",
            "No parking spot is currently stored."
          );
          return;
        }

        lastKnownSpot = chosen.spot;
        updateHeroFromSpot(chosen.spot, chosen.source);

        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${chosen.spot.lat},${chosen.spot.lng}`;
        window.open(mapsUrl, "_blank");
      } finally {
        setBusy(false);
      }
    }

    async function navigateToSavedLocation() {
      setBusy(true);
      setHeroState("waiting", "Preparing navigation", "Google Maps will open with walking directions.");

      try {
        let cloudSpot = null;

        if (currentUser) {
          cloudSpot = await loadCloudSpot();
        }

        const chosen = cloudSpot ? { spot: cloudSpot, source: "cloud" } : getBestAvailableSpot();

        if (!chosen.spot) {
          setHeroState(
            "error",
            "No saved location found",
            "No parking spot is currently stored."
          );
          return;
        }

        lastKnownSpot = chosen.spot;
        updateHeroFromSpot(chosen.spot, chosen.source);

        const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${chosen.spot.lat},${chosen.spot.lng}&travelmode=walking`;
        window.open(mapsUrl, "_blank");
      } finally {
        setBusy(false);
      }
    }

    async function clearSavedLocation() {
      setBusy(true);
      setHeroState("waiting", "Clearing saved data", "Removing local backup and cloud data...");

      try {
        clearLocalBackup();
        lastKnownSpot = null;

        if (currentUser) {
          try {
            await deleteDoc(getParkingDocRef(currentUser.uid));
            setPill(cloudPillEl, "Cloud: empty");
          } catch (error) {
            console.error(error);
            setPill(cloudPillEl, "Cloud: delete failed", "warn");
          }
        }

        setHeroState(
          "waiting",
          "Saved data cleared",
          "The stored parking spot was removed."
        );
      } finally {
        setBusy(false);
      }
    }

    window.showSavedLocation = showSavedLocation;
    window.navigateToSavedLocation = navigateToSavedLocation;
    window.clearSavedLocation = clearSavedLocation;

    async function init() {
      setBusy(true);

      if (currentMode === "save") {
        setPill(modePillEl, "Mode: NFC save", "ok");
      } else {
        setPill(modePillEl, "Mode: view only");
      }

      const localSpot = readLocalBackup();
      if (localSpot) {
        lastKnownSpot = localSpot;
        updateHeroFromSpot(localSpot, "local backup");
      } else {
        setHeroState("waiting", "Starting...", "Preparing secure storage.");
      }

      try {
        await ensureAnonymousLogin();
        setPill(cloudPillEl, "Cloud: connected", "ok");
      } catch (error) {
        console.error(error);
        setPill(cloudPillEl, "Cloud: auth failed", "warn");
        setHeroState(
          "error",
          "Cloud connection failed",
          "Local backup may still work on this device."
        );
        setBusy(false);
        return;
      }

      try {
        const cloudSpot = await loadCloudSpot();

        if (cloudSpot) {
          lastKnownSpot = cloudSpot;
          saveLocalBackup(cloudSpot);
          updateHeroFromSpot(cloudSpot, "cloud");
        }
      } catch (error) {
        console.error(error);
      }

      setBusy(false);

      if (currentMode === "save") {
        await saveParkingLocation();
      }
    }

    init();
  </script>
</body>
</html>
