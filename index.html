<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Saving Parking Spot</title>

  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <meta name="theme-color" content="#0f1014" />

  <style>
    :root {
      --bg-1: #0b0d12;
      --bg-2: #151922;
      --panel: rgba(24, 28, 38, 0.78);
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.14);
      --text: #ffffff;
      --muted: #aeb6c7;
      --accent: #ffd84d;
      --success: #35d07f;
      --success-soft: rgba(53, 208, 127, 0.16);
      --danger-soft: rgba(255, 107, 107, 0.15);
      --shadow-xl: 0 18px 45px rgba(0, 0, 0, 0.38);
      --shadow-md: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(255, 216, 77, 0.18), transparent 20%),
        radial-gradient(circle at bottom left, rgba(94, 160, 255, 0.10), transparent 24%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 470px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(14px);
      position: relative;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 24%),
        linear-gradient(315deg, rgba(255,216,77,0.04), transparent 22%);
      pointer-events: none;
    }

    .top {
      position: relative;
      padding: 26px 22px 18px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    }

    .title {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: 0.3px;
      color: var(--accent);
      text-shadow: 0 0 16px rgba(255, 216, 77, 0.18);
    }

    .content {
      position: relative;
      padding: 18px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(34, 39, 53, 0.92), rgba(21, 25, 34, 0.96));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px 18px;
      text-align: center;
      box-shadow: var(--shadow-md);
      margin-bottom: 14px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent 26%);
      pointer-events: none;
    }

    .hero-icon {
      width: 88px;
      height: 88px;
      margin: 0 auto 14px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line-strong);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      transition: all 0.28s ease;
    }

    .hero.saved .hero-icon {
      background: var(--success-soft);
      border-color: rgba(53, 208, 127, 0.35);
      box-shadow: 0 0 0 8px rgba(53, 208, 127, 0.06), inset 0 1px 0 rgba(255,255,255,0.08);
      transform: scale(1.03);
    }

    .hero.waiting .hero-icon {
      background: rgba(255, 216, 77, 0.10);
      border-color: rgba(255, 216, 77, 0.24);
      box-shadow: 0 0 0 8px rgba(255, 216, 77, 0.04), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .hero.error .hero-icon {
      background: var(--danger-soft);
      border-color: rgba(255, 107, 107, 0.28);
      box-shadow: 0 0 0 8px rgba(255, 107, 107, 0.04), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .hero-title {
      font-size: 1.2rem;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }

    .hero-text {
      color: #edf1f7;
      line-height: 1.5;
      min-height: 48px;
      font-size: 0.98rem;
    }

    .hero-meta {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0 16px;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: #eff3fa;
      backdrop-filter: blur(6px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .pill.ok {
      color: #d3ffe4;
      border-color: rgba(53, 208, 127, 0.18);
    }

    .pill.warn {
      color: #ffe9b3;
      border-color: rgba(255, 204, 102, 0.18);
    }

    .buttons {
      display: grid;
      gap: 12px;
    }

    button {
      appearance: none;
      border: none;
      width: 100%;
      min-height: 60px;
      border-radius: 18px;
      cursor: pointer;
      padding: 15px 16px;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.2px;
      color: white;
      transition: transform 0.12s ease, opacity 0.18s ease, filter 0.18s ease;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), transparent 34%);
      pointer-events: none;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .show-btn {
      background: linear-gradient(180deg, #6ba8ff, #447fea);
    }

    .nav-btn {
      background: linear-gradient(180deg, #4ba2ff, #2a7be8);
    }

    .clear-btn {
      background: linear-gradient(180deg, #ff7a7a, #e15555);
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.83rem;
      text-align: center;
      line-height: 1.45;
    }

    @media (max-width: 430px) {
      .title {
        font-size: 1.55rem;
      }

      .hero {
        padding: 20px 15px;
      }

      .hero-icon {
        width: 80px;
        height: 80px;
        font-size: 1.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1 class="title">Quick Saving Parking Spot</h1>
    </div>

    <div class="content">
      <div id="hero" class="hero waiting">
        <div id="heroIcon" class="hero-icon">📍</div>
        <div id="heroTitle" class="hero-title">Starting...</div>
        <div id="heroText" class="hero-text">Preparing location access and secure storage.</div>
        <div id="heroMeta" class="hero-meta"></div>
      </div>

      <div class="pill-row">
        <div id="cloudPill" class="pill">Cloud: checking...</div>
        <div id="localPill" class="pill">Local backup: checking...</div>
        <div id="modePill" class="pill">Mode: checking...</div>
      </div>

      <div class="buttons">
        <button class="show-btn" id="showBtn" onclick="showSavedLocation()">
          🗺️ Show on Maps
        </button>

        <button class="nav-btn" id="navigateBtn" onclick="navigateToSavedLocation()">
          🧭 Navigate There
        </button>

        <button class="clear-btn" id="clearBtn" onclick="clearSavedLocation()">
          🗑️ Clear Saved Data
        </button>
      </div>

      <div class="footer-note">
        Use NFC with <strong>?mode=save</strong> to save once without overwriting the stored spot during normal viewing.
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
    import {
      initializeFirestore,
      persistentLocalCache,
      persistentSingleTabManager,
      doc,
      setDoc,
      getDoc,
      deleteDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const firebaseConfig = {
    apiKey: "AIzaSyBJOuWflHjO3_b-VTerQrhrleIVBz50GGg",
    authDomain: "mini-cooper-routine.firebaseapp.com",
    projectId: "mini-cooper-routine",
    storageBucket: "mini-cooper-routine.firebasestorage.app",
    messagingSenderId: "734879685589",
    appId: "1:734879685589:web:a9a7f1b776efce00e43b5c",
    measurementId: "G-1LETT1WZQ6"
  };

    const LOCAL_KEY = "quickParkingSaveLocalBackupV4";
    const SESSION_SAVE_KEY = "parkingSavedThisSession";
    const MAX_ACCEPTABLE_ACCURACY_METERS = 15;

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, {
      localCache: persistentLocalCache({
        tabManager: persistentSingleTabManager()
      })
    });
    const auth = getAuth(app);

    const heroEl = document.getElementById("hero");
    const heroIconEl = document.getElementById("heroIcon");
    const heroTitleEl = document.getElementById("heroTitle");
    const heroTextEl = document.getElementById("heroText");
    const heroMetaEl = document.getElementById("heroMeta");

    const cloudPillEl = document.getElementById("cloudPill");
    const localPillEl = document.getElementById("localPill");
    const modePillEl = document.getElementById("modePill");

    const showBtn = document.getElementById("showBtn");
    const navigateBtn = document.getElementById("navigateBtn");
    const clearBtn = document.getElementById("clearBtn");

    let currentUser = null;
    let lastKnownSpot = null;

    const params = new URLSearchParams(window.location.search);
    const currentMode = params.get("mode") === "save" ? "save" : "view";

    function setBusy(isBusy) {
      showBtn.disabled = isBusy;
      navigateBtn.disabled = isBusy;
      clearBtn.disabled = isBusy;
    }

    function setPill(el, text, type = "") {
      el.textContent = text;
      el.className = `pill ${type}`.trim();
    }

    function formatDate(ms) {
      if (!ms) return "unknown time";
      return new Date(ms).toLocaleString("en-GB");
    }

    function getParkingDocRef(uid) {
      return doc(db, "users", uid, "parking", "current");
    }

    function clearSaveModeFromUrl() {
      const cleanUrl = window.location.pathname + window.location.hash;
      window.history.replaceState({}, document.title, cleanUrl);
    }

    function setHeroState(type, title, text, meta = "") {
      heroEl.className = `hero ${type}`;
      heroTitleEl.textContent = title;
      heroTextEl.textContent = text;
      heroMetaEl.textContent = meta;

      if (type === "saved") heroIconEl.textContent = "✅";
      else if (type === "error") heroIconEl.textContent = "⚠️";
      else heroIconEl.textContent = "📍";
    }

    function saveLocalBackup(data) {
      localStorage.setItem(LOCAL_KEY, JSON.stringify(data));
      setPill(localPillEl, "Local backup: ready", "ok");
    }

    function readLocalBackup() {
      try {
        const raw = localStorage.getItem(LOCAL_KEY);
        if (!raw) {
          setPill(localPillEl, "Local backup: empty");
          return null;
        }
        const parsed = JSON.parse(raw);
        setPill(localPillEl, "Local backup: ready", "ok");
        return parsed;
      } catch (error) {
        console.error(error);
        setPill(localPillEl, "Local backup: error", "warn");
        return null;
      }
    }

    function clearLocalBackup() {
      localStorage.removeItem(LOCAL_KEY);
      setPill(localPillEl, "Local backup: empty");
    }

    function updateHeroFromSpot(spot, source = "cloud") {
      if (!spot) {
        setHeroState(
          "waiting",
          "No saved location",
          "No parking spot is currently stored."
        );
        return;
      }

      const meta = [
        `Saved: ${formatDate(spot.savedAtMillis)}`,
        `Accuracy: ${spot.accuracy ? Math.round(spot.accuracy) + "m" : "unknown"}`,
        `Source: ${source}`
      ].join(" • ");

      setHeroState(
        "saved",
        "Parking spot saved successfully",
        "Your saved spot is ready to open in Google Maps.",
        meta
      );
    }

    async function ensureAnonymousLogin() {
      return new Promise((resolve, reject) => {
        const unsubscribe = onAuthStateChanged(auth, async (user) => {
          if (user) {
            currentUser = user;
            unsubscribe();
            resolve(user);
            return;
          }

          try {
            const result = await signInAnonymously(auth);
            currentUser = result.user;
            unsubscribe();
            resolve(result.user);
          } catch (error) {
            unsubscribe();
            reject(error);
          }
        });
      });
    }

    async function loadCloudSpot() {
      if (!currentUser) return null;

      try {
        const snap = await getDoc(getParkingDocRef(currentUser.uid));

        if (!snap.exists()) {
          setPill(cloudPillEl, "Cloud: empty");
          return null;
        }

        const data = snap.data();
        const spot = {
          lat: data.lat,
          lng: data.lng,
          accuracy: data.accuracy || null,
          savedAtMillis: data.savedAtMillis || null
        };

        setPill(cloudPillEl, "Cloud: ready", "ok");
        return spot;
      } catch (error) {
        console.error(error);
        setPill(cloudPillEl, "Cloud: unavailable", "warn");
        return null;
      }
    }

    function getCurrentLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("Geolocation is not supported on this device/browser."));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => resolve(position),
          (error) => reject(error),
          {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
          }
        );
      });
    }

    async function saveParkingLocation() {
      if (!currentUser) {
        setHeroState("error", "Cloud not ready", "Please refresh and try again.");
        return false;
      }

      setHeroState(
        "waiting",
        "Saving parking spot",
        "Please allow location access if your browser asks for permission."
      );

      setBusy(true);

      try {
        const position = await getCurrentLocation();
        const measuredAccuracy = position.coords.accuracy;

        if (typeof measuredAccuracy !== "number" || measuredAccuracy > MAX_ACCEPTABLE_ACCURACY_METERS) {
          setPill(localPillEl, `GPS too weak: ${Math.round(measuredAccuracy || 0)}m`, "warn");
          setHeroState(
            "error",
            "Accuracy too low to save",
            `Current GPS accuracy is ${Math.round(measuredAccuracy || 0)}m. A value of ${MAX_ACCEPTABLE_ACCURACY_METERS}m or better is required.`,
            "Move to a clearer area and scan the NFC again."
          );
          return false;
        }

        const spot = {
          lat: position.coords.latitude,
          lng: position.coords.longitude,
          accuracy: measuredAccuracy,
          savedAtMillis: Date.now()
        };

        saveLocalBackup(spot);
        lastKnownSpot = spot;
        updateHeroFromSpot(spot, "local backup");

        try {
          await setDoc(getParkingDocRef(currentUser.uid), {
            ...spot,
            savedAt: serverTimestamp()
          });

          setPill(cloudPillEl, "Cloud: synced", "ok");
          updateHeroFromSpot(spot, "cloud + local backup");

          if (navigator.vibrate) {
            navigator.vibrate(80);
          }

          return true;
        } catch (cloudError) {
          console.error(cloudError);
          setPill(cloudPillEl, "Cloud: pending/failed", "warn");

          setHeroState(
            "saved",
            "Saved locally",
            "The spot was stored on this device, but cloud sync failed.",
            `Saved: ${formatDate(spot.savedAtMillis)} • Accuracy: ${Math.round(spot.accuracy)}m`
          );

          return true;
        }
      } catch (error) {
        console.error(error);

        if (error.code === 1) {
          setHeroState(
            "error",
            "Location permission denied",
            "The browser did not get permission, so nothing was saved."
          );
        } else if (error.code === 2) {
          setHeroState(
            "error",
            "Location unavailable",
            "Try again in a place with better GPS signal."
          );
        } else if (error.code === 3) {
          setHeroState(
            "error",
            "Location request timed out",
            "Please try again."
          );
        } else {
          setHeroState(
            "error",
            "Could not get location",
            error.message || "Unknown error."
          );
        }

        return false;
      } finally {
        setBusy(false);
      }
    }

    function getBestAvailableSpot() {
      if (lastKnownSpot) return { spot: lastKnownSpot, source: "memory" };

      const localSpot = readLocalBackup();
      if (localSpot) return { spot: localSpot, source: "local backup" };

      return { spot: null, source: null };
    }

    async function showSavedLocation() {
      setBusy(true);
      setHeroState("waiting", "Checking saved location", "Opening your saved point in Google Maps...");

      try {
        let cloudSpot = null;

        if (currentUser) {
          cloudSpot = await loadCloudSpot();
        }

        const chosen = cloudSpot ? { spot: cloudSpot, source: "cloud" } : getBestAvailableSpot();

        if (!chosen.spot) {
          setHeroState(
            "error",
            "No saved location found",
            "No parking spot is currently stored."
          );
          return;
        }

        lastKnownSpot = chosen.spot;
        updateHeroFromSpot(chosen.spot, chosen.source);

        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${chosen.spot.lat},${chosen.spot.lng}`;
        window.open(mapsUrl, "_blank");
      } finally {
        setBusy(false);
      }
    }

    async function navigateToSavedLocation() {
      setBusy(true);
      setHeroState("waiting", "Preparing navigation", "Google Maps will open with walking directions.");

      try {
        let cloudSpot = null;

        if (currentUser) {
          cloudSpot = await loadCloudSpot();
        }

        const chosen = cloudSpot ? { spot: cloudSpot, source: "cloud" } : getBestAvailableSpot();

        if (!chosen.spot) {
          setHeroState(
            "error",
            "No saved location found",
            "No parking spot is currently stored."
          );
          return;
        }

        lastKnownSpot = chosen.spot;
        updateHeroFromSpot(chosen.spot, chosen.source);

        const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${chosen.spot.lat},${chosen.spot.lng}&travelmode=walking`;
        window.open(mapsUrl, "_blank");
      } finally {
        setBusy(false);
      }
    }

    async function clearSavedLocation() {
      setBusy(true);
      setHeroState("waiting", "Clearing saved data", "Removing local backup and cloud data...");

      try {
        clearLocalBackup();
        sessionStorage.removeItem(SESSION_SAVE_KEY);
        lastKnownSpot = null;

        if (currentUser) {
          try {
            await deleteDoc(getParkingDocR
