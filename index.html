<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Save Parking Spot</title>

  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b0d12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root {
      --bg-1: #07090d;
      --bg-2: #10141d;
      --bg-3: #171c27;
      --panel: rgba(20, 24, 34, 0.76);
      --panel-strong: rgba(25, 31, 44, 0.92);
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.14);
      --text: #ffffff;
      --muted: #aeb6c7;
      --accent: #ffd84d;
      --accent-2: #ffbf1f;
      --success: #35d07f;
      --success-soft: rgba(53, 208, 127, 0.16);
      --danger: #ff6d6d;
      --danger-soft: rgba(255, 109, 109, 0.15);
      --search-soft: rgba(77, 144, 254, 0.16);
      --blue: #5ea0ff;
      --shadow-xl: 0 24px 60px rgba(0, 0, 0, 0.42);
      --shadow-lg: 0 16px 36px rgba(0, 0, 0, 0.34);
      --shadow-md: 0 10px 24px rgba(0, 0, 0, 0.26);
      --radius-xl: 32px;
      --radius-lg: 26px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(255, 216, 77, 0.18), transparent 18%),
        radial-gradient(circle at bottom left, rgba(94, 160, 255, 0.10), transparent 24%),
        linear-gradient(180deg, var(--bg-3) 0%, var(--bg-2) 38%, var(--bg-1) 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px 16px;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .app {
      width: 100%;
      max-width: 455px;
      min-height: 760px;
      height: auto;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.022));
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(16px);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 22%),
        linear-gradient(315deg, rgba(255,216,77,0.05), transparent 24%);
      pointer-events: none;
    }

    .top {
      position: relative;
      padding: 28px 24px 18px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      flex: 0 0 auto;
    }

    .title {
      margin: 0;
      font-size: 1.68rem;
      font-weight: 900;
      letter-spacing: 0.35px;
      color: var(--accent);
      text-shadow:
        0 0 18px rgba(255, 216, 77, 0.15),
        0 0 36px rgba(255, 216, 77, 0.05);
    }

    .content {
      position: relative;
      padding: 22px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1 1 auto;
      min-height: 0;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(31, 36, 50, 0.95), rgba(18, 22, 31, 0.98));
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 26px 20px 20px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      flex: 0 0 auto;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), transparent 28%);
      pointer-events: none;
    }

    .hero-icon-wrap {
      position: relative;
      width: 102px;
      height: 102px;
      margin: 0 auto 18px;
    }

    .hero-icon {
      position: relative;
      z-index: 2;
      width: 102px;
      height: 102px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line-strong);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 6px 18px rgba(0,0,0,0.18);
      transition: all 0.28s ease;
    }

    .hero.saved .hero-icon {
      background: var(--success-soft);
      border-color: rgba(53, 208, 127, 0.35);
      box-shadow:
        0 0 0 10px rgba(53, 208, 127, 0.06),
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 10px 24px rgba(0,0,0,0.20);
      transform: scale(1.03);
    }

    .hero.waiting .hero-icon {
      background: rgba(255, 216, 77, 0.10);
      border-color: rgba(255, 216, 77, 0.24);
      box-shadow:
        0 0 0 10px rgba(255, 216, 77, 0.04),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .hero.searching .hero-icon {
      background: var(--search-soft);
      border-color: rgba(77, 144, 254, 0.35);
      box-shadow:
        0 0 0 10px rgba(77, 144, 254, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .hero.error .hero-icon {
      background: var(--danger-soft);
      border-color: rgba(255, 109, 109, 0.28);
      box-shadow:
        0 0 0 10px rgba(255, 109, 109, 0.04),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .radar-ring,
    .radar-ring-2 {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(77, 144, 254, 0.35);
      opacity: 0;
      transform: scale(0.7);
      pointer-events: none;
      display: none;
    }

    .hero.searching .radar-ring,
    .hero.searching .radar-ring-2 {
      display: block;
    }

    .hero.searching .radar-ring {
      animation: radarPulse 1.8s infinite;
    }

    .hero.searching .radar-ring-2 {
      animation: radarPulse 1.8s infinite 0.9s;
    }

    @keyframes radarPulse {
      0% { transform: scale(0.72); opacity: 0.82; }
      100% { transform: scale(1.52); opacity: 0; }
    }

    .hero-title {
      font-size: 1.18rem;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }

    .hero-text {
      color: #eef2f8;
      line-height: 1.46;
      min-height: 22px;
      font-size: 0.98rem;
      padding: 0 4px;
    }

    .hero-meta {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
      word-break: break-word;
      min-height: 18px;
      padding: 0 4px;
    }

    .action-row {
      display: none;
      gap: 10px;
      margin-top: 16px;
    }

    .action-row.show {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .mini-btn {
      min-height: 48px;
      border-radius: 15px;
      border: none;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: linear-gradient(180deg, #6ba8ff, #447fea);
      box-shadow: var(--shadow-md);
    }

    .mini-btn.cancel {
      background: linear-gradient(180deg, #6f737c, #4f545d);
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      flex: 0 0 auto;
      padding: 0 2px;
    }

    .pill {
      padding: 9px 13px;
      border-radius: 999px;
      font-size: 0.79rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: #eff3fa;
      backdrop-filter: blur(6px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
      white-space: nowrap;
    }

    .pill.ok {
      color: #d3ffe4;
      border-color: rgba(53, 208, 127, 0.18);
    }

    .pill.warn {
      color: #ffe9b3;
      border-color: rgba(255, 204, 102, 0.18);
    }

    .buttons {
      display: grid;
      gap: 13px;
      margin-top: 6px;
      flex: 0 0 auto;
    }

    button {
      appearance: none;
      border: none;
      width: 100%;
      min-height: 60px;
      border-radius: var(--radius-md);
      cursor: pointer;
      padding: 15px 18px;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.2px;
      color: white;
      transition: transform 0.12s ease, opacity 0.18s ease, filter 0.18s ease;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.14), transparent 34%);
      pointer-events: none;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .show-btn {
      background: linear-gradient(180deg, #6fb0ff, #447fea);
    }

    .nav-btn {
      background: linear-gradient(180deg, #4ea6ff, #297ae7);
    }

    .clear-btn {
      background: linear-gradient(180deg, #ff7d7d, #e25656);
    }

    .install-hint {
      display: none;
    }

    /* Site/browser: more breathing room */
    @media (display-mode: browser) {
      body {
        padding: 26px 18px;
      }

      .app {
        min-height: 780px;
      }

      .top {
        padding-top: 30px;
        padding-bottom: 20px;
      }

      .content {
        padding: 24px 20px 24px;
        gap: 18px;
      }

      .buttons {
        margin-top: 2px;
      }
    }

    /* Installed app: tighter, but still premium */
    @media (display-mode: standalone) {
      body {
        padding: 10px;
      }

      .app {
        min-height: 96vh;
      }
    }

    @media (max-height: 760px) {
      .app {
        min-height: 94vh;
      }

      .top {
        padding: 20px 18px 14px;
      }

      .title {
        font-size: 1.44rem;
      }

      .content {
        padding: 16px 14px 16px;
        gap: 12px;
      }

      .hero {
        padding: 18px 14px 16px;
      }

      .hero-icon-wrap {
        width: 86px;
        height: 86px;
        margin-bottom: 14px;
      }

      .hero-icon {
        width: 86px;
        height: 86px;
        font-size: 1.85rem;
      }

      button {
        min-height: 54px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1 class="title">Save Parking Spot</h1>
    </div>

    <div class="content">
      <div id="hero" class="hero waiting">
        <div class="hero-icon-wrap">
          <div class="radar-ring"></div>
          <div class="radar-ring-2"></div>
          <div id="heroIcon" class="hero-icon">📍</div>
        </div>

        <div id="heroTitle" class="hero-title">Starting...</div>
        <div id="heroText" class="hero-text">Preparing secure storage.</div>
        <div id="heroMeta" class="hero-meta"></div>

        <div id="saveAnywayRow" class="action-row">
          <button class="mini-btn cancel" onclick="cancelSaveAnyway()">Cancel</button>
          <button class="mini-btn" onclick="saveBestFoundAnyway()">Save Anyway</button>
        </div>
      </div>

      <div class="pill-row">
        <div id="cloudPill" class="pill">Cloud: checking...</div>
        <div id="localPill" class="pill">Local backup: checking...</div>
        <div id="modePill" class="pill">Mode: checking...</div>
      </div>

      <div class="buttons">
        <button class="show-btn" id="showBtn" onclick="showSavedLocation()">
          🗺️ Show on Maps
        </button>

        <button class="nav-btn" id="navigateBtn" onclick="navigateToSavedLocation()">
          🧭 Navigate to Spot
        </button>

        <button class="clear-btn" id="clearBtn" onclick="clearSavedLocation()">
          🗑️ Clear Saved Data
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
    import {
      initializeFirestore,
      persistentLocalCache,
      persistentSingleTabManager,
      doc,
      setDoc,
      getDoc,
      deleteDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJOuWflHjO3_b-VTerQrhrleIVBz50GGg",
      authDomain: "mini-cooper-routine.firebaseapp.com",
      projectId: "mini-cooper-routine",
      storageBucket: "mini-cooper-routine.firebasestorage.app",
      messagingSenderId: "734879685589",
      appId: "1:734879685589:web:a9a7f1b776efce00e43b5c",
      measurementId: "G-1LETT1WZQ6"
    };

    const LOCAL_KEY = "saveParkingSpotLocalBackupV4";
    const SESSION_SAVE_KEY = "parkingSavedThisSession";
    const MAX_ACCEPTABLE_ACCURACY_METERS = 5;
    const MAX_LOCATION_ATTEMPTS = 10;
    const RETRY_DELAY_MS = 1500;

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, {
      localCache: persistentLocalCache({
        tabManager: persistentSingleTabManager()
      })
    });
    const auth = getAuth(app);

    const heroEl = document.getElementById("hero");
    const heroIconEl = document.getElementById("heroIcon");
    const heroTitleEl = document.getElementById("heroTitle");
    const heroTextEl = document.getElementById("heroText");
    const heroMetaEl = document.getElementById("heroMeta");

    const cloudPillEl = document.getElementById("cloudPill");
    const localPillEl = document.getElementById("localPill");
    const modePillEl = document.getElementById("modePill");

    const showBtn = document.getElementById("showBtn");
    const navigateBtn = document.getElementById("navigateBtn");
    const clearBtn = document.getElementById("clearBtn");
    const saveAnywayRow = document.getElementById("saveAnywayRow");

    let currentUser = null;
    let lastKnownSpot = null;
    let bestFailedSpot = null;

    const params = new URLSearchParams(window.location.search);
    const currentMode = params.get("mode") === "save" ? "save" : "view";

    function setBusy(isBusy) {
      showBtn.disabled = isBusy;
      navigateBtn.disabled = isBusy;
      clearBtn.disabled = isBusy;
    }

    function vibratePattern(type) {
      if (!navigator.vibrate) return;
      if (type === "search-start") navigator.vibrate([30]);
      if (type === "success") navigator.vibrate([70, 35, 90]);
      if (type === "error") navigator.vibrate([110, 45, 110]);
    }

    function setPill(el, text, type = "") {
      el.textContent = text;
      el.className = `pill ${type}`.trim();
    }

    function formatDate(ms) {
      if (!ms) return "";
      return new Date(ms).toLocaleString("en-GB");
    }

    function getParkingDocRef(uid) {
      return doc(db, "users", uid, "parking", "current");
    }

    function clearSaveModeFromUrl() {
      const cleanUrl = window.location.pathname + window.location.hash;
      window.history.replaceState({}, document.title, cleanUrl);
    }

    function hideSaveAnyway() {
      saveAnywayRow.classList.remove("show");
      bestFailedSpot = null;
    }

    function showSaveAnyway() {
      saveAnywayRow.classList.add("show");
    }

    function setHeroState(type, title, text = "", meta = "") {
      heroEl.className = `hero ${type}`;
      heroTitleEl.textContent = title;
      heroTextEl.textContent = text;
      heroMetaEl.textContent = meta;

      if (type === "saved") heroIconEl.textContent = "✅";
      else if (type === "error") heroIconEl.textContent = "⚠️";
      else heroIconEl.textContent = "📍";
    }

    function saveLocalBackup(data) {
      localStorage.setItem(LOCAL_KEY, JSON.stringify(data));
      setPill(localPillEl, "Local backup: ready", "ok");
    }

    function readLocalBackup() {
      try {
        const raw = localStorage.getItem(LOCAL_KEY);
        if (!raw) {
          setPill(localPillEl, "Local backup: empty");
          return null;
        }
        const parsed = JSON.parse(raw);
        setPill(localPillEl, "Local backup: ready", "ok");
        return parsed;
      } catch (error) {
        console.error(error);
        setPill(localPillEl, "Local backup: error", "warn");
        return null;
      }
    }

    function clearLocalBackup() {
      localStorage.removeItem(LOCAL_KEY);
      setPill(localPillEl, "Local backup: empty");
    }

    function updateHeroFromSpot(spot) {
      if (!spot) {
        setHeroState("waiting", "No saved location", "");
        return;
      }

      hideSaveAnyway();
      setHeroState(
        "saved",
        "Parking spot saved successfully",
        "",
        `Saved: ${formatDate(spot.savedAtMillis)} • Accuracy: ${spot.accuracy ? Math.round(spot.accuracy) + "m" : "unknown"}`
      );
    }

    async function ensureAnonymousLogin() {
      return new Promise((resolve, reject) => {
        const unsubscribe = onAuthStateChanged(auth, async (user) => {
          if (user) {
            currentUser = user;
            unsubscribe();
            resolve(user);
            return;
          }

          try {
            const result = await signInAnonymously(auth);
            currentUser = result.user;
            unsubscribe();
            resolve(result.user);
          } catch (error) {
            unsubscribe();
            reject(error);
          }
        });
      });
    }

    async function loadCloudSpot() {
      if (!currentUser) return null;

      try {
        const snap = await getDoc(getParkingDocRef(currentUser.uid));

        if (!snap.exists()) {
          setPill(cloudPillEl, "Cloud: empty");
          return null;
        }

        const data = snap.data();
        const spot = {
          lat: data.lat,
          lng: data.lng,
          accuracy: data.accuracy || null,
          savedAtMillis: data.savedAtMillis || null
        };

        setPill(cloudPillEl, "Cloud: ready", "ok");
        return spot;
      } catch (error) {
        console.error(error);
        setPill(cloudPillEl, "Cloud: unavailable", "warn");
        return null;
      }
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getCurrentLocationOnce() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("Geolocation is not supported on this device/browser."));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => resolve(position),
          (error) => reject(error),
          {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
          }
        );
      });
    }

    async function getBestAccurateLocation() {
      let bestPosition = null;
      vibratePattern("search-start");

      for (let attempt = 1; attempt <= MAX_LOCATION_ATTEMPTS; attempt++) {
        setHeroState(
          "searching",
          "Searching for your location",
          `GPS scan ${attempt}/${MAX_LOCATION_ATTEMPTS}`,
          bestPosition
            ? `Best accuracy so far: ${Math.round(bestPosition.coords.accuracy)}m`
            : "Waiting for first accurate GPS fix..."
        );

        try {
          const position = await getCurrentLocationOnce();
          const accuracy = position.coords.accuracy;

          if (!bestPosition || accuracy < bestPosition.coords.accuracy) {
            bestPosition = position;
          }

          if (typeof accuracy === "number" && accuracy <= MAX_ACCEPTABLE_ACCURACY_METERS) {
            return { position, accepted: true, bestPosition: position };
          }
        } catch (error) {
          if (attempt === MAX_LOCATION_ATTEMPTS && !bestPosition) {
            throw error;
          }
        }

        if (attempt < MAX_LOCATION_ATTEMPTS) {
          await wait(RETRY_DELAY_MS);
        }
      }

      if (bestPosition) {
        return { position: bestPosition, accepted: false, bestPosition };
      }

      throw new Error("Could not get a usable location.");
    }

    async function persistSpot(spot, cloudFailureTitle = "Saved locally") {
      saveLocalBackup(spot);
      lastKnownSpot = spot;
      updateHeroFromSpot(spot);

      try {
        await setDoc(getParkingDocRef(currentUser.uid), {
          ...spot,
          savedAt: serverTimestamp()
        });

        setPill(cloudPillEl, "Cloud: synced", "ok");
        updateHeroFromSpot(spot);
        vibratePattern("success");
        return true;
      } catch (cloudError) {
        console.error(cloudError);
        setPill(cloudPillEl, "Cloud: pending/failed", "warn");
        setHeroState(
          "saved",
          cloudFailureTitle,
          "",
          `Saved: ${formatDate(spot.savedAtMillis)} • Accuracy: ${Math.round(spot.accuracy)}m`
        );
        vibratePattern("error");
        return true;
      }
    }

    async function saveParkingLocation() {
      if (!currentUser) {
        setHeroState("error", "Cloud not ready", "", "Please refresh and try again.");
        vibratePattern("error");
        return false;
      }

      hideSaveAnyway();
      setBusy(true);

      try {
        const result = await getBestAccurateLocation();
        const position = result.position;
        const measuredAccuracy = position.coords.accuracy;

        const spot = {
          lat: position.coords.latitude,
          lng: position.coords.longitude,
          accuracy: measuredAccuracy,
          savedAtMillis: Date.now()
        };

        if (!result.accepted) {
          bestFailedSpot = spot;
          setPill(localPillEl, `Best found: ${Math.round(measuredAccuracy || 0)}m`, "warn");
          setHeroState(
            "error",
            "Accuracy not good enough",
            `Best GPS result: ${Math.round(measuredAccuracy || 0)}m`,
            `Required: ${MAX_ACCEPTABLE_ACCURACY_METERS}m or better`
          );
          showSaveAnyway();
          vibratePattern("error");
          return false;
        }

        return await persistSpot(spot);
      } catch (error) {
        console.error(error);

        if (error.code === 1) {
          setHeroState("error", "Location permission denied", "");
        } else if (error.code === 2) {
          setHeroState("error", "Location unavailable", "");
        } else if (error.code === 3) {
          setHeroState("error", "Location request timed out", "");
        } else {
          setHeroState("error", "Could not get location", "");
        }

        vibratePattern("error");
        return false;
      } finally {
        setBusy(false);
      }
    }

    function getBestAvailableSpot() {
      if (lastKnownSpot) return { spot: lastKnownSpot };

      const localSpot = readLocalBackup();
      if (localSpot) return { spot: localSpot };

      return { spot: null };
    }

    async function showSavedLocation() {
      hideSaveAnyway();
      setBusy(true);
      setHeroState("waiting", "Opening saved spot", "");

      try {
        let cloudSpot = null;

        if (currentUser) {
          cloudSpot = await loadCloudSpot();
        }

        const chosen = cloudSpot ? { spot: cloudSpot } : getBestAvailableSpot();

        if (!chosen.spot) {
          setHeroState("error", "No saved location found", "");
          return;
        }

        lastKnownSpot = chosen.spot;
        updateHeroFromSpot(chosen.spot);

        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${chosen.spot.lat},${chosen.spot.lng}`;
        window.open(mapsUrl, "_blank");
      } finally {
        setBusy(false);
      }
    }

    async function navigateToSavedLocation() {
      hideSaveAnyway();
      setBusy(true);
      setHeroState("waiting", "Preparing navigation", "");

      try {
        let cloudSpot = null;

        if (currentUser) {
          cloudSpot = await loadCloudSpot();
        }

        const chosen = cloudSpot ? { spot: cloudSpot } : getBestAvailableSpot();

        if (!chosen.spot) {
          setHeroState("error", "No saved location found", "");
          return;
        }

        lastKnownSpot = chosen.spot;
        updateHeroFromSpot(chosen.spot);

        const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${chosen.spot.lat},${chosen.spot.lng}&travelmode=walking&dir_action=navigate`;
        window.open(mapsUrl, "_blank");
      } finally {
        setBusy(false);
      }
    }

    async function clearSavedLocation() {
      hideSaveAnyway();
      setBusy(true);
      setHeroState("waiting", "Clearing saved data", "");

      try {
        clearLocalBackup();
        sessionStorage.removeItem(SESSION_SAVE_KEY);
        lastKnownSpot = null;

        if (currentUser) {
          try {
            await deleteDoc(getParkingDocRef(currentUser.uid));
            setPill(cloudPillEl, "Cloud: empty");
          } catch (error) {
            console.error(error);
            setPill(cloudPillEl, "Cloud: delete failed", "warn");
          }
        }

        setHeroState("waiting", "Saved data cleared", "");
      } finally {
        setBusy(false);
      }
    }

    async function saveBestFoundAnyway() {
      if (!bestFailedSpot || !currentUser) return;

      hideSaveAnyway();
      setBusy(true);

      try {
        await persistSpot(bestFailedSpot, "Saved locally");
        sessionStorage.setItem(SESSION_SAVE_KEY, "true");
        clearSaveModeFromUrl();
        setPill(modePillEl, "Mode: view only");
      } finally {
        setBusy(false);
      }
    }

    function cancelSaveAnyway() {
      hideSaveAnyway();
      setHeroState("waiting", "Save cancelled", "");
      clearSaveModeFromUrl();
      setPill(modePillEl, "Mode: view only");
    }

    window.showSavedLocation = showSavedLocation;
    window.navigateToSavedLocation = navigateToSavedLocation;
    window.clearSavedLocation = clearSavedLocation;
    window.saveBestFoundAnyway = saveBestFoundAnyway;
    window.cancelSaveAnyway = cancelSaveAnyway;

    async function init() {
      setBusy(true);

      if (currentMode === "save") {
        setPill(modePillEl, "Mode: NFC save", "ok");
      } else {
        setPill(modePillEl, "Mode: view only");
      }

      const localSpot = readLocalBackup();
      if (localSpot) {
        lastKnownSpot = localSpot;
        updateHeroFromSpot(localSpot);
      } else {
        setHeroState("waiting", "Starting...", "");
      }

      try {
        await ensureAnonymousLogin();
        setPill(cloudPillEl, "Cloud: connected", "ok");
      } catch (error) {
        console.error(error);
        setPill(cloudPillEl, "Cloud: auth failed", "warn");
        setHeroState("error", "Cloud connection failed", "");
        setBusy(false);
        return;
      }

      try {
        const cloudSpot = await loadCloudSpot();

        if (cloudSpot) {
          lastKnownSpot = cloudSpot;
          saveLocalBackup(cloudSpot);
          updateHeroFromSpot(cloudSpot);
        }
      } catch (error) {
        console.error(error);
      }

      setBusy(false);

      if (currentMode === "save") {
        if (sessionStorage.getItem(SESSION_SAVE_KEY)) {
          clearSaveModeFromUrl();
          setPill(modePillEl, "Mode: view only");
          setHeroState("saved", "Parking already saved", "");
          return;
        }

        const savedSuccessfully = await saveParkingLocation();

        if (savedSuccessfully) {
          sessionStorage.setItem(SESSION_SAVE_KEY, "true");
          clearSaveModeFromUrl();
          setPill(modePillEl, "Mode: view only");
        }
      }
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          await navigator.serviceWorker.register("./sw.js");
        } catch (error) {
          console.error("Service worker registration failed:", error);
        }
      });
    }

    init();
  </script>
</body>
</html>
